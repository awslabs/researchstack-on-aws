# ResearchStack on AWS - Research Computing Portfolio
# This portfolio contains all standard research computing templates.
# Customize products and sharing targets for your institution.

[portfolio]
name = "research-computing"
display_name = "Research Computing"
description = "Standard research computing resources for researchers and IT staff"
provider_name = "ResearchStack on AWS"

# Support metadata (applied to all products in this portfolio)
support_email = "cloud-support@university.edu"
support_url = "https://university.edu/cloud-support"
support_description = "Contact the Cloud Team for help with provisioning or troubleshooting"
distributor = "University Cloud Team"

# OUs to share this portfolio with (must be listed in framework_config.yaml available_ous)
share_target_ous = [
    "ou-xxxx-xxxxxxxx",
]

# IAM principal ARN patterns to grant portfolio access (propagated to spoke accounts via principal sharing).
# Supports wildcards — useful for IDC roles where the suffix varies.
# IDC roles live under the path aws-reserved/sso.amazonaws.com/.
# Example: "arn:aws:iam:::role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_AWSServiceCatalogEndUserAccess*"
access_principals = [
    "arn:aws:iam:::role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_AdministratorAccess*",
    "arn:aws:iam:::role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_AWSServiceCatalogEndUserAccess*",
]

# Share settings
share_tag_options = true
share_principals = true

# --- Products ---
# Each product points at a CloudFormation template and declares the managed policies
# its launch role needs. One IAM role is created per product (least privilege).
# "name" is the machine identifier (used for IAM roles, StackSets — no spaces).
# "display_name" is what researchers see in the Service Catalog console.
# "description" is shown on the product detail page.

[[portfolio.products]]
name = "s3-research-bucket"
display_name = "Storage Bucket"
description = "Secure S3 bucket with versioning and intelligent tiering for research data"
template = "../templates/storage/s3-research-bucket.yaml"
launch_role_policies = ["AmazonS3FullAccess"]

[[portfolio.products]]
name = "efs-shared-storage"
display_name = "Shared File Storage (EFS)"
description = "Network file system for shared access across multiple instances"
template = "../templates/storage/efs-shared-storage.yaml"
launch_role_policies = ["AmazonElasticFileSystemFullAccess", "AmazonEC2FullAccess", "AWSLambda_FullAccess"]

  # VPC CIDR lookup Lambda needs to create/delete its own IAM role
  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:PassRole", "iam:TagRole", "iam:UntagRole"]
  resources = ["*"]

[[portfolio.products]]
name = "s3-files"
display_name = "S3 Files (Filesystem on S3)"
description = "Mount an S3 bucket as a POSIX filesystem via NFS - ~13x cheaper than EFS, full read/write support"
template = "../templates/storage/s3-files.yaml"
launch_role_policies = ["AmazonS3FullAccess", "AmazonEC2FullAccess", "AWSLambda_FullAccess"]

  # S3 Files role (named) + VPC CIDR lookup Lambda role
  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:PassRole", "iam:TagRole", "iam:UntagRole"]
  resources = ["*"]

  # S3 Files service actions (not covered by AmazonS3FullAccess)
  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "ec2-general-purpose"
display_name = "General Purpose Compute (EC2)"
description = "M-series instances for balanced CPU, memory, and networking workloads"
template = "../templates/compute/ec2-general-purpose.yaml"
launch_role_policies = ["AmazonEC2FullAccess", "AmazonSSMManagedInstanceCore", "AmazonS3FullAccess", "CloudWatchFullAccess"]

  # Instance role, instance profile, S3 Files role (conditional)
  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListRolePolicies", "iam:ListAttachedRolePolicies", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:ListRoleTags", "iam:CreateInstanceProfile", "iam:DeleteInstanceProfile", "iam:AddRoleToInstanceProfile", "iam:RemoveRoleFromInstanceProfile", "iam:GetInstanceProfile", "iam:ListInstanceProfilesForRole"]
  resources = ["*"]

  # S3 Files resources (conditional, when AutoCreateStorage = s3-files)
  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "ec2-compute-optimized"
display_name = "CPU-Optimized Compute (EC2)"
description = "C-series instances for compute-intensive tasks like simulations and modeling"
template = "../templates/compute/ec2-compute-optimized.yaml"
launch_role_policies = ["AmazonEC2FullAccess", "AmazonSSMManagedInstanceCore", "AmazonS3FullAccess", "CloudWatchFullAccess"]

  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListRolePolicies", "iam:ListAttachedRolePolicies", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:ListRoleTags", "iam:CreateInstanceProfile", "iam:DeleteInstanceProfile", "iam:AddRoleToInstanceProfile", "iam:RemoveRoleFromInstanceProfile", "iam:GetInstanceProfile", "iam:ListInstanceProfilesForRole"]
  resources = ["*"]

  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "ec2-memory-optimized"
display_name = "Memory-Optimized Compute (EC2)"
description = "R-series instances for memory-intensive workloads like genomics and large datasets"
template = "../templates/compute/ec2-memory-optimized.yaml"
launch_role_policies = ["AmazonEC2FullAccess", "AmazonSSMManagedInstanceCore", "AmazonS3FullAccess", "CloudWatchFullAccess"]

  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListRolePolicies", "iam:ListAttachedRolePolicies", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:ListRoleTags", "iam:CreateInstanceProfile", "iam:DeleteInstanceProfile", "iam:AddRoleToInstanceProfile", "iam:RemoveRoleFromInstanceProfile", "iam:GetInstanceProfile", "iam:ListInstanceProfilesForRole"]
  resources = ["*"]

  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "ec2-accelerated-gpu"
display_name = "GPU Compute (EC2)"
description = "G-series NVIDIA GPU instances with Deep Learning Base AMI for ML training, inference, and GPU-accelerated research"
template = "../templates/compute/ec2-accelerated-gpu.yaml"
launch_role_policies = ["AmazonEC2FullAccess", "AmazonSSMManagedInstanceCore", "AmazonS3FullAccess", "CloudWatchFullAccess"]

  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListRolePolicies", "iam:ListAttachedRolePolicies", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:ListRoleTags", "iam:CreateInstanceProfile", "iam:DeleteInstanceProfile", "iam:AddRoleToInstanceProfile", "iam:RemoveRoleFromInstanceProfile", "iam:GetInstanceProfile", "iam:ListInstanceProfilesForRole"]
  resources = ["*"]

  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "ec2-spot-fleet"
display_name = "Spot Fleet (EC2)"
description = "Cost-optimized Spot instances across multiple instance types and AZs — up to 70% savings vs On-Demand"
template = "../templates/compute/ec2-spot-fleet.yaml"
launch_role_policies = ["AmazonEC2FullAccess", "AmazonSSMManagedInstanceCore", "AmazonS3FullAccess", "CloudWatchFullAccess"]

  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListRolePolicies", "iam:ListAttachedRolePolicies", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:ListRoleTags", "iam:CreateInstanceProfile", "iam:DeleteInstanceProfile", "iam:AddRoleToInstanceProfile", "iam:RemoveRoleFromInstanceProfile", "iam:GetInstanceProfile", "iam:ListInstanceProfilesForRole"]
  resources = ["*"]

  [[portfolio.products.custom_policy]]
  actions = ["s3files:*", "events:*"]
  resources = ["*"]

[[portfolio.products]]
name = "parallelcluster-slurm"
display_name = "Slurm Cluster (ParallelCluster)"
description = "Full HPC cluster with Slurm scheduler, optional DCV remote desktop, and shared storage"
template = "../templates/compute/parallelcluster-hpc.yaml"
# IAMFullAccess retained: PCluster's provider Lambda manages IAM roles internally
# (cluster roles, compute fleet roles, policies). The provider's own IAM admin policy
# constrains what it can do, but enumerating every action is fragile across PCluster versions.
launch_role_policies = [
    "AmazonEC2FullAccess",
    "AmazonS3FullAccess",
    "AWSLambda_FullAccess",
    "AmazonElasticFileSystemFullAccess",
    "IAMFullAccess",
    "SecretsManagerReadWrite",
    "CloudWatchFullAccess",
    "AmazonDynamoDBFullAccess",
    "AmazonRoute53FullAccess",
]

[[portfolio.products]]
name = "sagemaker-studio"
display_name = "SageMaker Studio"
description = "Managed Jupyter environment with GPU support for ML development"
template = "../templates/ml/sagemaker-studio.yaml"
launch_role_policies = ["AmazonS3FullAccess", "AmazonEC2FullAccess"]

  [[portfolio.products.custom_policy]]
  actions = ["sagemaker:*"]
  resources = ["*"]

  # SageMaker execution role (named)
  [[portfolio.products.custom_policy]]
  actions = ["iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:PassRole", "iam:TagRole", "iam:UntagRole", "iam:GetRolePolicy"]
  resources = ["*"]

[[portfolio.products]]
name = "research-vpc"
display_name = "Research Networking (VPC)"
description = "Reusable VPC with public/private subnets, NAT gateway, and VPC endpoints"
template = "../templates/networking/research-vpc.yaml"
launch_role_policies = ["AmazonVPCFullAccess"]

[[portfolio.products]]
name = "budget-alert"
display_name = "Budget Alert"
description = "Monthly budget tracking by cost center with email alerts at 50%, 80%, and 100% thresholds. Optionally scoped to a specific project."
template = "../templates/governance/budget-alert.yaml"
launch_role_policies = ["AWSBudgetsActionsWithAWSResourceControlAccess", "AmazonSNSFullAccess"]
