# ResearchStack on AWS - Service Catalog Framework Configuration
# Update these values for your organization before deploying.

deployment:
  hub_account: "913524900475"       # Your SC hub account ID (12 digits)
  hub_region: "us-east-1"           # Region to deploy SC resources
  organization_id: "o-zq90fbbqcu" # Your AWS Organization ID
  default_env_name: "test"

# OUs that portfolios can share to (validated against portfolio configs)
available_ous:
  - "ou-ajo0-pu0xwe7g"  # Replace with your OU IDs

# Tags applied to all CDK-managed stacks
tagging:
  required_tags:
    Project: "test-infra"
    ManagedBy: "ServiceCatalog"
