AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS Shared Storage - Network file system for shared access across compute resources'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Research Project Information'
        Parameters:
          - ProjectName
          - CostCenter
          - Owner
      - Label:
          default: 'Network Configuration'
        Parameters:
          - VpcId
          - SubnetIds
      - Label:
          default: 'Filesystem Options'
        Parameters:
          - FileSystemName
          - AutomaticBackups
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      CostCenter:
        default: 'Cost Center'
      Owner:
        default: 'Owner Email (optional)'
      VpcId:
        default: 'VPC ID'
      SubnetIds:
        default: 'Subnet IDs'
      FileSystemName:
        default: 'Filesystem Name'
      AutomaticBackups:
        default: 'Enable Automatic Backups'

Parameters:
  ProjectName:
    Type: String
    Description: 'Research project name (used for cost tracking tags)'
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters and hyphens'
    MinLength: 3
    MaxLength: 40

  CostCenter:
    Type: String
    Description: 'Department or grant number for cost allocation'
    MinLength: 1

  Owner:
    Type: String
    Default: ''
    Description: 'PI or researcher email for cost tracking - helps FinOps trace resources back to a person (optional)'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC where the EFS filesystem will be deployed (ask your IT admin)'

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Private subnets for EFS mount targets - use the same subnets where your EC2 instances run (select 2-3 in different AZs for high availability)'

  FileSystemName:
    Type: String
    Default: shared-storage
    Description: 'Name for the EFS filesystem (also used for the security group name, e.g., shared-storage, shared-storage-sg)'
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]*$'
    ConstraintDescription: 'Must start with a letter and contain only alphanumeric characters and hyphens'
    MinLength: 3
    MaxLength: 40

  AutomaticBackups:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: 'Enable automatic daily backups (adds cost but recommended for production)'

Conditions:
  HasOwner: !Not [!Equals [!Ref Owner, '']]
  HasSecondSubnet: !Not [!Equals [!Join [',', !Ref SubnetIds], !Select [0, !Ref SubnetIds]]]
  HasThirdSubnet: !And
    - !Condition HasSecondSubnet
    - !Not [!Equals [!Join [',', !Ref SubnetIds], !Join [',', [!Select [0, !Ref SubnetIds], !Select [1, !Ref SubnetIds]]]]]

Resources:
  EfsFilesystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      ThroughputMode: elastic
      PerformanceMode: generalPurpose
      BackupPolicy:
        Status: !Ref AutomaticBackups
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowMountTargetAccess
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - elasticfilesystem:ClientRootAccess
              - elasticfilesystem:ClientWrite
              - elasticfilesystem:ClientMount
            Condition:
              Bool:
                elasticfilesystem:AccessedViaMountTarget: 'true'
          - Sid: EnforceTLS
            Effect: Deny
            Principal:
              AWS: '*'
            Action: '*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
      FileSystemTags:
        - Key: Name
          Value: !Ref FileSystemName
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ARC-Toolkit
        - Key: Environment
          Value: Research

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Security group for EFS filesystem ${FileSystemName}'
      GroupName: !Sub '${AWS::StackName}-efs-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress: []
      Tags:
        - Key: Name
          Value: !Sub '${FileSystemName}-sg'
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ARC-Toolkit
        - Key: Environment
          Value: Research

  EfsSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EfsSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref EfsSecurityGroup
      Description: 'Allow NFS access from instances with this security group attached'

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFilesystem
      SecurityGroups:
        - !Ref EfsSecurityGroup
      SubnetId: !Select [0, !Ref SubnetIds]

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Condition: HasSecondSubnet
    Properties:
      FileSystemId: !Ref EfsFilesystem
      SecurityGroups:
        - !Ref EfsSecurityGroup
      SubnetId: !Select [1, !Ref SubnetIds]

  EfsMountTarget3:
    Type: AWS::EFS::MountTarget
    Condition: HasThirdSubnet
    Properties:
      FileSystemId: !Ref EfsFilesystem
      SecurityGroups:
        - !Ref EfsSecurityGroup
      SubnetId: !Select [2, !Ref SubnetIds]

Outputs:
  EFSFilesystemId:
    Description: 'ID of the EFS filesystem (use this to mount)'
    Value: !Ref EfsFilesystem
    Export:
      Name: !Sub '${AWS::StackName}-FilesystemId'

  FileSystemArn:
    Description: 'ARN of the EFS filesystem'
    Value: !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EfsFilesystem}'
    Export:
      Name: !Sub '${AWS::StackName}-FileSystemArn'

  SecurityGroupId:
    Description: 'ID of the EFS security group (add this to EC2 instances that need access)'
    Value: !Ref EfsSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'

  MountCommand:
    Description: 'Command to mount the EFS filesystem on Linux'
    Value: !Sub 'sudo mount -t efs -o tls ${EfsFilesystem}:/ /mnt/efs'
