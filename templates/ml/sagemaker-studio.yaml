AWSTemplateFormatVersion: '2010-09-09'
Description: 'SageMaker Studio Domain for Research'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Research Project Information'
        Parameters:
          - ProjectName
          - CostCenter
          - Owner
      - Label:
          default: 'Basic Configuration'
        Parameters:
          - DomainName
      - Label:
          default: 'Network Configuration'
        Parameters:
          - VpcId
          - SubnetIds
      - Label:
          default: 'Storage Configuration'
        Parameters:
          - ExistingS3BucketName
          - ExistingEfsFileSystemId
          - EfsGroupId
          - EfsFileSystemPath
  
  ResearchLifecycle:
    Phases:
      - Phase2B
      - Phase2C
    Description: 'ML development and production workloads'
  
  QuickSuite:
    Keywords:
      - ml
      - sagemaker
      - jupyter
      - gpu
      - machine-learning
    UseCases:
      - ML model development
      - Data science notebooks
      - GPU-accelerated computing

Parameters:
  ProjectName:
    Type: String
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    MinLength: 3
    MaxLength: 40
  
  CostCenter:
    Type: String
    MinLength: 1
  
  Owner:
    Type: String
    Default: ''
    Description: 'PI or researcher email for cost tracking (optional)'
  
  DomainName:
    Type: String
    AllowedPattern: ^[a-z0-9\-]{1,40}$
  
  VpcId:
    Type: AWS::EC2::VPC::Id
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  
  ExistingS3BucketName:
    Type: String
    Default: ''
  
  ExistingEfsFileSystemId:
    Type: String
    Default: ''
    AllowedPattern: ^(fs-[0-9a-f]{8,})?$
  
  EfsGroupId:
    Type: Number
    Default: 1100
    MinValue: 1000
    MaxValue: 4000000
  
  EfsFileSystemPath:
    Type: String
    Default: '/'
    AllowedPattern: ^\/.*$

Conditions:
  CreateNewBucket: !Equals [!Ref ExistingS3BucketName, '']
  HasCustomEfs: !Not [!Equals [!Ref ExistingEfsFileSystemId, '']]

Resources:
  ResearchDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewBucket
    Properties:
      BucketName: !Sub 'sagemaker-${DomainName}-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      IntelligentTieringConfigurations:
        - Id: EntireBucket
          Status: Enabled
          Tierings:
            - AccessTier: ARCHIVE_ACCESS
              Days: 90
            - AccessTier: DEEP_ARCHIVE_ACCESS
              Days: 180
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-studio-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !If 
                    - CreateNewBucket
                    - !Sub '${ResearchDataBucket.Arn}/*'
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}/*'
                  - !If 
                    - CreateNewBucket
                    - !GetAtt ResearchDataBucket.Arn
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'SageMaker Studio ${DomainName}'
      GroupName: !Sub '${DomainName}-studio-sg'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound traffic for SageMaker Studio'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerSecurityGroupIngressNFS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SageMakerSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref SageMakerSecurityGroup
      Description: 'Allow NFS traffic between SageMaker Studio instances for EFS access'

  SageMakerSecurityGroupIngressInternal:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SageMakerSecurityGroup
      IpProtocol: tcp
      FromPort: 8192
      ToPort: 65535
      SourceSecurityGroupId: !Ref SageMakerSecurityGroup
      Description: 'Allow internal SageMaker Studio traffic for kernel and app communication'

  SageMakerStudioDomain:
    Type: AWS::SageMaker::Domain
    Properties:
      DomainName: !Sub '${DomainName}-studio'
      AuthMode: SSO
      DefaultUserSettings:
        ExecutionRole: !GetAtt SageMakerExecutionRole.Arn
        SecurityGroups:
          - !Ref SageMakerSecurityGroup
        CustomPosixUserConfig: !If
          - HasCustomEfs
          - Uid: 10000
            Gid: !Ref EfsGroupId
          - !Ref AWS::NoValue
        CustomFileSystemConfigs: !If
          - HasCustomEfs
          - - EFSFileSystemConfig:
                FileSystemId: !Ref ExistingEfsFileSystemId
                FileSystemPath: !Ref EfsFileSystemPath
          - !Ref AWS::NoValue
      DefaultSpaceSettings:
        ExecutionRole: !GetAtt SageMakerExecutionRole.Arn
        SecurityGroups:
          - !Ref SageMakerSecurityGroup
        CustomPosixUserConfig: !If
          - HasCustomEfs
          - Uid: 10000
            Gid: !Ref EfsGroupId
          - !Ref AWS::NoValue
        CustomFileSystemConfigs: !If
          - HasCustomEfs
          - - EFSFileSystemConfig:
                FileSystemId: !Ref ExistingEfsFileSystemId
                FileSystemPath: !Ref EfsFileSystemPath
          - !Ref AWS::NoValue
      VpcId: !Ref VpcId
      SubnetIds: !Ref SubnetIds
      AppNetworkAccessType: VpcOnly
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

Outputs:
  DomainId:
    Value: !Ref SageMakerStudioDomain
  
  S3BucketName:
    Value: !If 
      - CreateNewBucket
      - !Ref ResearchDataBucket
      - !Ref ExistingS3BucketName
  
  ManagedEfsId:
    Value: !GetAtt SageMakerStudioDomain.HomeEfsFileSystemId
