AWSTemplateFormatVersion: '2010-09-09'
Description: 'SageMaker Studio Domain — managed Jupyter environment with GPU support for ML development and data science'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Research Project Information'
        Parameters:
          - ProjectName
          - CostCenter
          - Owner
      - Label:
          default: 'Domain Configuration'
        Parameters:
          - DomainName
      - Label:
          default: 'Network Configuration'
        Parameters:
          - VpcId
          - SubnetIds
      - Label:
          default: 'Storage Configuration (optional)'
        Parameters:
          - ExistingS3BucketName
          - ExistingEfsFileSystemId
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      CostCenter:
        default: 'Cost Center'
      Owner:
        default: 'Owner Email (optional)'
      DomainName:
        default: 'Domain Name'
      VpcId:
        default: 'VPC ID'
      SubnetIds:
        default: 'Subnet IDs'
      ExistingS3BucketName:
        default: 'Existing S3 Bucket Name (optional)'
      ExistingEfsFileSystemId:
        default: 'Existing EFS Filesystem ID (optional)'

Parameters:
  ProjectName:
    Type: String
    Description: 'Research project name (used for cost tracking tags and resource naming)'
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters and hyphens'
    MinLength: 3
    MaxLength: 40

  CostCenter:
    Type: String
    Description: 'Department or grant number for cost allocation'
    MinLength: 1

  Owner:
    Type: String
    Default: ''
    Description: 'PI or researcher email for cost tracking (optional)'

  DomainName:
    Type: String
    Description: 'Name for the SageMaker Studio domain (lowercase, numbers, hyphens only). Used in resource naming — must be unique per account/region.'
    AllowedPattern: '^[a-z0-9-]{1,40}$'
    ConstraintDescription: 'Must be lowercase letters, numbers, and hyphens only (max 40 characters)'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC to deploy SageMaker Studio in (deploy the Research VPC template first if you do not have one)'

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Subnets for SageMaker Studio — select 2-3 in different AZs for high availability. Must be in the same VPC.'

  ExistingS3BucketName:
    Type: String
    Default: ''
    Description: 'Existing S3 bucket name for research data (from the S3 template stack outputs). If blank, a new bucket is created automatically.'
    AllowedPattern: '^$|^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name or blank'

  ExistingEfsFileSystemId:
    Type: String
    Default: ''
    Description: 'Existing EFS filesystem ID to mount in Studio spaces (e.g., fs-0123456789abcdef0). Leave blank if not using shared EFS storage.'
    AllowedPattern: '^$|^fs-[0-9a-f]{8,}$'
    ConstraintDescription: 'Must be a valid EFS filesystem ID (fs-xxxx) or blank'

Conditions:
  CreateNewBucket: !Equals [!Ref ExistingS3BucketName, '']
  HasCustomEfs: !Not [!Equals [!Ref ExistingEfsFileSystemId, '']]
  HasOwner: !Not [!Equals [!Ref Owner, '']]

Resources:
  ResearchDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewBucket
    Properties:
      BucketName: !Sub 'sagemaker-${DomainName}-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      IntelligentTieringConfigurations:
        - Id: EntireBucket
          Status: Enabled
          Tierings:
            - AccessTier: ARCHIVE_ACCESS
              Days: 90
            - AccessTier: DEEP_ARCHIVE_ACCESS
              Days: 180
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-studio-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !If
                    - CreateNewBucket
                    - !Sub '${ResearchDataBucket.Arn}/*'
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}/*'
                  - !If
                    - CreateNewBucket
                    - !GetAtt ResearchDataBucket.Arn
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'SageMaker Studio ${DomainName}'
      GroupName: !Sub '${DomainName}-studio-sg'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound traffic for SageMaker Studio'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  SageMakerSecurityGroupIngressNFS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SageMakerSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref SageMakerSecurityGroup
      Description: 'Allow NFS traffic between SageMaker Studio instances for EFS access'

  SageMakerSecurityGroupIngressInternal:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SageMakerSecurityGroup
      IpProtocol: tcp
      FromPort: 8192
      ToPort: 65535
      SourceSecurityGroupId: !Ref SageMakerSecurityGroup
      Description: 'Allow internal SageMaker Studio traffic for kernel and app communication'

  SageMakerStudioDomain:
    Type: AWS::SageMaker::Domain
    Properties:
      DomainName: !Sub '${DomainName}-studio'
      AuthMode: SSO
      DefaultUserSettings:
        ExecutionRole: !GetAtt SageMakerExecutionRole.Arn
        SecurityGroups:
          - !Ref SageMakerSecurityGroup
        CustomPosixUserConfig: !If
          - HasCustomEfs
          - Uid: 10000
            Gid: 1100
          - !Ref AWS::NoValue
        CustomFileSystemConfigs: !If
          - HasCustomEfs
          - - EFSFileSystemConfig:
                FileSystemId: !Ref ExistingEfsFileSystemId
                FileSystemPath: /
          - !Ref AWS::NoValue
      DefaultSpaceSettings:
        ExecutionRole: !GetAtt SageMakerExecutionRole.Arn
        SecurityGroups:
          - !Ref SageMakerSecurityGroup
        CustomPosixUserConfig: !If
          - HasCustomEfs
          - Uid: 10000
            Gid: 1100
          - !Ref AWS::NoValue
        CustomFileSystemConfigs: !If
          - HasCustomEfs
          - - EFSFileSystemConfig:
                FileSystemId: !Ref ExistingEfsFileSystemId
                FileSystemPath: /
          - !Ref AWS::NoValue
      VpcId: !Ref VpcId
      SubnetIds: !Ref SubnetIds
      AppNetworkAccessType: VpcOnly
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

Outputs:
  DomainId:
    Description: 'SageMaker Studio domain ID'
    Value: !Ref SageMakerStudioDomain

  S3BucketName:
    Description: 'S3 bucket for research data (auto-created or existing)'
    Value: !If
      - CreateNewBucket
      - !Ref ResearchDataBucket
      - !Ref ExistingS3BucketName

  ManagedEfsId:
    Description: 'EFS filesystem ID managed by SageMaker Studio (for home directories)'
    Value: !GetAtt SageMakerStudioDomain.HomeEfsFileSystemId
