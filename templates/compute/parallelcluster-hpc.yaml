AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS ParallelCluster deployment with Slurm scheduler, optional DCV remote desktop, and shared EFS storage'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Research Project Information'
        Parameters:
          - ProjectName
          - CostCenter
          - Owner
      - Label:
          default: 'Cluster Configuration'
        Parameters:
          - ClusterName
          - OperatingSystem
      - Label:
          default: 'Head Node'
        Parameters:
          - HeadNodeInstanceType
      - Label:
          default: 'Compute Nodes'
        Parameters:
          - ComputeInstanceType
          - ComputePricingModel
          - MaxComputeNodes
          - CapacityBlockId
      - Label:
          default: 'Networking'
        Parameters:
          - HeadNodeSubnetId
          - ComputeSubnetId
      - Label:
          default: 'Storage (optional)'
        Parameters:
          - EfsFileSystemId
          - S3BucketName
          - FsxLustreFileSystemId
      - Label:
          default: 'Access'
        Parameters:
          - KeyPairName
          - EnableDCV
          - DCVAllowedIps
          - DCVPassword
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      CostCenter:
        default: 'Cost Center'
      Owner:
        default: 'Owner Email (optional)'
      ClusterName:
        default: 'Cluster Name'
      OperatingSystem:
        default: 'Operating System'
      HeadNodeInstanceType:
        default: 'Head Node Instance Type'
      ComputeInstanceType:
        default: 'Compute Instance Type'
      ComputePricingModel:
        default: 'Compute Pricing Model'
      MaxComputeNodes:
        default: 'Maximum Compute Nodes'
      CapacityBlockId:
        default: 'Capacity Block Reservation ID (optional)'
      HeadNodeSubnetId:
        default: 'Head Node Subnet (public)'
      ComputeSubnetId:
        default: 'Compute Node Subnet (private recommended)'
      EfsFileSystemId:
        default: 'Existing EFS Filesystem ID (optional)'
      S3BucketName:
        default: 'S3 Bucket Name (optional)'
      FsxLustreFileSystemId:
        default: 'Existing FSx for Lustre ID (optional)'
      KeyPairName:
        default: 'SSH Key Pair (optional)'
      EnableDCV:
        default: 'Enable DCV Remote Desktop'
      DCVAllowedIps:
        default: 'DCV Allowed IP Range'
      DCVPassword:
        default: 'DCV Desktop Password'

Parameters:
  ProjectName:
    Type: String
    Description: 'Research project name (used for cost tracking tags and resource naming)'
    AllowedPattern: '^[a-zA-Z0-9-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters and hyphens'
    MinLength: 3
    MaxLength: 40

  CostCenter:
    Type: String
    Description: 'Department or grant number for cost allocation'
    MinLength: 1

  Owner:
    Type: String
    Default: ''
    Description: 'PI or researcher email for cost tracking (optional)'

  ClusterName:
    Type: String
    Description: 'Name for the cluster'
    Default: 'research-cluster'
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]{0,59}$'
    ConstraintDescription: 'Must start with a letter, up to 60 characters, alphanumeric and hyphens only'

  OperatingSystem:
    Type: String
    Description: 'Operating system for cluster nodes. Amazon Linux 2023 recommended for broadest compatibility.'
    AllowedValues: ['alinux2023', 'ubuntu2204', 'ubuntu2404']
    Default: 'alinux2023'

  HeadNodeInstanceType:
    Type: String
    Description: 'Instance type for head node (runs Slurm controller + optional DCV desktop). m7i.2xlarge is a good default for DCV; m7i.large is sufficient for CLI-only clusters. Graviton (e.g., m7g) supported.'
    Default: 'm7i.2xlarge'
    AllowedPattern: '^(m[5-9]|c[5-9])[a-z0-9]*\.(medium|x?large|[2-9]?xlarge|[1-9][0-9]*xlarge)$'
    ConstraintDescription: 'Must be an M-series or C-series instance type (e.g., m7i.2xlarge, c7g.4xlarge)'

  ComputeInstanceType:
    Type: String
    Description: 'Instance type for compute nodes. C-series for CPU, R-series for memory, G-series for GPU, P-series for ML training (requires Capacity Block), Hpc-series for tightly-coupled. Graviton supported.'
    Default: 'c7i.8xlarge'
    AllowedPattern: '^(c[5-9]|m[5-9]|r[5-9]|g[4-6]|p[4-6]|hpc[6-8])[a-z0-9]*\.(medium|x?large|[2-9]?xlarge|[1-9][0-9]*xlarge|metal)$'
    ConstraintDescription: 'Must be a C, M, R, G, P, or Hpc-series instance type (e.g., c7i.8xlarge, g6.12xlarge, p5.48xlarge)'

  ComputePricingModel:
    Type: String
    Description: 'Pricing model for compute nodes. Spot saves up to 70% but instances can be interrupted. Use On-Demand for critical workloads.'
    AllowedValues: ['SPOT', 'ONDEMAND']
    Default: 'ONDEMAND'

  MaxComputeNodes:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100
    Description: 'Maximum number of compute nodes that Slurm can scale to. Nodes launch on job submission and terminate after idle timeout.'

  CapacityBlockId:
    Type: String
    Default: ''
    Description: 'EC2 Capacity Block reservation ID for P-series GPU instances (required for p4/p5/p6 since they cannot be launched on-demand). Leave blank for all other instance types.'

  HeadNodeSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet for the head node. Use a public subnet (has internet gateway) so DCV and SSH are reachable from outside the VPC.'

  ComputeSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet for compute nodes. A private subnet with NAT Gateway is recommended (better security, lower data transfer costs). Must be in the same VPC as the head node subnet.'

  EfsFileSystemId:
    Type: String
    Default: ''
    Description: 'Existing EFS filesystem ID to mount at /shared (e.g., fs-0123456789abcdef0). If blank, a new EFS is created and deleted with the cluster. If provided, the EFS persists independently of the cluster lifecycle.'

  S3BucketName:
    Type: String
    Default: ''
    Description: 'S3 bucket name to grant the head node read/write access (e.g., my-research-data). Leave blank if not needed.'

  FsxLustreFileSystemId:
    Type: String
    Default: ''
    Description: 'Existing FSx for Lustre filesystem ID to mount at /lustre (e.g., fs-0123456789abcdef0). The filesystem security group must allow ports 988, 1021-1023 from the cluster subnets. Leave blank if not using Lustre.'

  KeyPairName:
    Type: String
    Default: ''
    Description: 'EC2 key pair name for SSH access (optional). If blank, use Session Manager or DCV to connect. Create a key pair in the EC2 console if you need SSH.'

  EnableDCV:
    Type: String
    Description: 'Enable NICE DCV remote desktop on the head node. Provides a full GUI desktop accessible via web browser. Set to no if you only need CLI access.'
    AllowedValues: ['yes', 'no']
    Default: 'yes'

  DCVAllowedIps:
    Type: String
    Default: ''
    Description: 'CIDR block allowed to connect to DCV (e.g., 203.0.113.0/24 for your office, 0.0.0.0/0 for anywhere). Required when DCV is enabled.'

  DCVPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'Password for DCV desktop login (username: ec2-user for Amazon Linux, ubuntu for Ubuntu). Required when DCV is enabled. Min 8 characters.'

Conditions:
  HasOwner: !Not [!Equals [!Ref Owner, '']]
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasCapacityBlock: !Not [!Equals [!Ref CapacityBlockId, '']]
  HasExistingEfs: !Not [!Equals [!Ref EfsFileSystemId, '']]
  HasFsxLustre: !Not [!Equals [!Ref FsxLustreFileSystemId, '']]
  HasS3Bucket: !Not [!Equals [!Ref S3BucketName, '']]
  DCVEnabled: !Equals [!Ref EnableDCV, 'yes']
  IsUbuntu: !Or
    - !Equals [!Ref OperatingSystem, 'ubuntu2204']
    - !Equals [!Ref OperatingSystem, 'ubuntu2404']

Resources:
  # AWS-provided ParallelCluster custom resource provider
  PclusterClusterProvider:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub
        - 'https://${AWS::Region}-aws-parallelcluster.s3.${AWS::Region}.${AWS::URLSuffix}/parallelcluster/3.14.0/templates/custom_resource/cluster.yaml'
        - {}
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchCloudToolkit
        - Key: Environment
          Value: Research

  # S3 bucket for bootstrap scripts
  BootstrapBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'pcluster-bootstrap-${AWS::StackName}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchCloudToolkit
        - Key: Environment
          Value: Research

  BootstrapBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BootstrapBucket
      PolicyDocument:
        Statement:
          - Sid: AllowParallelClusterAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - 's3:GetObject'
              - 's3:ListBucket'
            Resource:
              - !GetAtt BootstrapBucket.Arn
              - !Sub '${BootstrapBucket.Arn}/*'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt BootstrapBucket.Arn
              - !Sub '${BootstrapBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  # Scoped IAM policy for head node to read DCV password from Secrets Manager.
  # Named with 'parallelcluster' prefix so the ParallelCluster Lambda's IAM admin
  # policy allows attaching it (the provider allowlists arn:...:policy/parallelcluster*).
  DCVSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: DCVEnabled
    Properties:
      ManagedPolicyName: !Sub 'parallelcluster-${AWS::StackName}-dcv-secrets'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'secretsmanager:GetSecretValue'
            Resource: !Ref DCVPasswordSecret

  # Secrets Manager for DCV password (only when DCV is enabled)
  DCVPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DCVEnabled
    Properties:
      Name: !Sub '${AWS::StackName}-dcv-password'
      Description: !Sub 'DCV desktop password for ${ClusterName}'
      SecretString: !Ref DCVPassword
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchCloudToolkit
        - Key: Environment
          Value: Research

  # IAM role for bootstrap upload Lambda
  BootstrapUploadRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:PutObject', 's3:DeleteObject', 's3:GetObject']
                Resource: !Sub '${BootstrapBucket.Arn}/*'

  # Lambda function to upload bootstrap script
  BootstrapUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      Role: !GetAtt BootstrapUploadRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client('s3')
          
          BOOTSTRAP_SCRIPT = '''#!/bin/bash
          LOG_FILE="/var/log/bootstrap.log"
          
          log() {
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
          }
          
          ENABLE_DCV="${1:-no}"
          SECRET_ARN="${2:-}"
          
          log "=== Bootstrap Script Started ==="
          log "Hostname: $(hostname), DCV: $ENABLE_DCV"
          
          if [[ "$ENABLE_DCV" != "yes" ]]; then
              log "DCV not enabled, nothing to do"
              log "=== Bootstrap Script Completed ==="
              exit 0
          fi
          
          # Detect OS
          if [ -f /etc/os-release ]; then
              . /etc/os-release
              OS_ID=$ID
              log "Detected OS: $OS_ID ($PRETTY_NAME)"
          else
              log "ERROR: Cannot detect OS"
              exit 1
          fi
          
          # Set package manager
          if [[ "$OS_ID" == "ubuntu" ]]; then
              PKG_INSTALL="apt-get install -y"
              PKG_GROUP=""
              apt-get update -y >> "$LOG_FILE" 2>&1 || log "WARNING: apt-get update had issues"
          else
              if command -v dnf &> /dev/null; then
                  PKG_INSTALL="dnf install -y"
                  PKG_GROUP="dnf groupinstall -y"
              else
                  PKG_INSTALL="yum install -y"
                  PKG_GROUP="yum groupinstall -y"
              fi
          fi
          
          log "Installing desktop environment for DCV..."
          if [[ "$OS_ID" == "ubuntu" ]]; then
              DEBIAN_FRONTEND=noninteractive $PKG_INSTALL ubuntu-desktop >> "$LOG_FILE" 2>&1
          elif [[ "$OS_ID" == "amzn" ]]; then
              $PKG_GROUP "Desktop" >> "$LOG_FILE" 2>&1 || log "WARNING: Desktop had issues"
          else
              $PKG_GROUP "Server with GUI" >> "$LOG_FILE" 2>&1 || log "WARNING: GUI had issues"
          fi
          systemctl set-default graphical.target
          
          # Set DCV user
          if [[ "$OS_ID" == "ubuntu" ]]; then
              DCV_USER="ubuntu"
          else
              DCV_USER="ec2-user"
          fi
          
          # Retrieve password from Secrets Manager
          if [ -n "$SECRET_ARN" ]; then
              REGION=$(TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600") && curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo "")
              if [ -n "$REGION" ]; then
                  DCV_PASSWORD=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --region "$REGION" --query SecretString --output text 2>/dev/null || echo "")
                  if [ -n "$DCV_PASSWORD" ]; then
                      echo "$DCV_USER:$DCV_PASSWORD" | chpasswd
                      log "Set DCV password for $DCV_USER"
                  else
                      log "WARNING: Could not retrieve DCV password from Secrets Manager"
                  fi
              fi
          fi
          
          # Enable system authentication for DCV
          sed -i 's/^#*authentication=.*/authentication="system"/' /etc/dcv/dcv.conf
          sed -i 's/^auth-token-verifier=/#auth-token-verifier=/' /etc/dcv/dcv.conf
          sed -i 's/^ca-file=/#ca-file=/' /etc/dcv/dcv.conf
          
          cat >> /etc/dcv/dcv.conf << DCVEOF
          
          [display]
          max-head-resolution=(4096, 2160)
          
          [clipboard]
          primary-selection-copy=true
          primary-selection-paste=true
          DCVEOF
          
          # DCV session service
          cat > /etc/systemd/system/dcv-session.service << EOF
          [Unit]
          Description=Create DCV Session
          After=dcvserver.service
          Requires=dcvserver.service
          
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=/bin/sleep 10
          ExecStart=/bin/bash -c 'dcv close-session my-session 2>/dev/null || true; dcv create-session --type=virtual --owner ${DCV_USER} my-session'
          ExecStop=/usr/bin/dcv close-session my-session
          User=root
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          systemctl daemon-reload
          systemctl enable dcv-session.service
          systemctl start dcv-session.service
          log "DCV configured with system authentication"
          
          log "=== Bootstrap Script Completed ==="
          '''
          
          def handler(event, context):
              try:
                  bucket = event['ResourceProperties']['Bucket']
                  key = event['ResourceProperties']['Key']
                  
                  if event['RequestType'] == 'Delete':
                      try:
                          s3.delete_object(Bucket=bucket, Key=key)
                      except Exception as e:
                          logger.warning("Cleanup error (non-fatal): %s", e)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  s3.put_object(
                      Bucket=bucket, Key=key,
                      Body=BOOTSTRAP_SCRIPT,
                      ContentType='text/x-shellscript'
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, f"s3://{bucket}/{key}")
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))

  BootstrapScriptUpload:
    Type: Custom::S3Object
    Properties:
      ServiceToken: !GetAtt BootstrapUploadFunction.Arn
      Bucket: !Ref BootstrapBucket
      Key: 'bootstrap.sh'

  # Elastic IP for stable head node address
  HeadNodeElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-head-node-eip'
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchCloudToolkit
        - Key: Environment
          Value: Research

  # IAM role for EIP association Lambda
  EIPAssociationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: EC2EIPAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:AssociateAddress'
                  - 'ec2:DisassociateAddress'
                Resource: !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Allow
                Action:
                  - 'ec2:DescribeAddresses'
                  - 'ec2:DescribeInstances'
                Resource: '*'

  EIPAssociationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      Role: !GetAtt EIPAssociationRole.Arn
      Timeout: 500
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          ec2 = boto3.client('ec2')
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  instance_id = event['ResourceProperties']['InstanceId']
                  allocation_id = event['ResourceProperties']['AllocationId']
                  
                  waiter = ec2.get_waiter('instance_running')
                  waiter.wait(InstanceIds=[instance_id])
                  
                  response = ec2.associate_address(
                      InstanceId=instance_id,
                      AllocationId=allocation_id
                  )
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, 
                                 {'AssociationId': response['AssociationId']})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))

  # ParallelCluster
  PclusterCluster:
    Type: Custom::PclusterCluster
    DependsOn: BootstrapScriptUpload
    Properties:
      ServiceToken: !GetAtt [PclusterClusterProvider, Outputs.ServiceToken]
      ClusterName: !Ref ClusterName
      ClusterConfiguration:
        Image:
          Os: !Ref OperatingSystem
        Tags:
          - Key: Project
            Value: !Ref ProjectName
          - Key: CostCenter
            Value: !Ref CostCenter
          - Key: ManagedBy
            Value: ResearchCloudToolkit
          - Key: Environment
            Value: Research
        HeadNode:
          InstanceType: !Ref HeadNodeInstanceType
          Networking:
            SubnetId: !Ref HeadNodeSubnetId
          Ssh: !If
            - HasKeyPair
            - KeyName: !Ref KeyPairName
            - !Ref 'AWS::NoValue'
          LocalStorage:
            RootVolume:
              Size: 100
              VolumeType: gp3
          Iam:
            AdditionalIamPolicies:
              - Policy: !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
              - !If
                - DCVEnabled
                - Policy: !Ref DCVSecretsPolicy
                - !Ref 'AWS::NoValue'
            S3Access:
              - BucketName: !Ref BootstrapBucket
                EnableWriteAccess: false
              - !If
                - HasS3Bucket
                - BucketName: !Ref S3BucketName
                  EnableWriteAccess: true
                - !Ref 'AWS::NoValue'
          Dcv: !If
            - DCVEnabled
            - Enabled: true
              AllowedIps: !Ref DCVAllowedIps
            - !Ref 'AWS::NoValue'
          CustomActions:
            OnNodeConfigured:
              Script: !Sub 's3://${BootstrapBucket}/bootstrap.sh'
              Args:
                - !Ref EnableDCV
                - !If [DCVEnabled, !Ref DCVPasswordSecret, '']
        Scheduling:
          Scheduler: slurm
          SlurmQueues:
            - Name: compute
              CapacityType: !If
                - HasCapacityBlock
                - CAPACITY_BLOCK
                - !Ref ComputePricingModel
              ComputeSettings:
                LocalStorage:
                  RootVolume:
                    Size: 50
                    VolumeType: gp3
              ComputeResources:
                - Name: compute-nodes
                  InstanceType: !Ref ComputeInstanceType
                  MinCount: 0
                  MaxCount: !Ref MaxComputeNodes
                  CapacityReservationTarget: !If
                    - HasCapacityBlock
                    - CapacityReservationId: !Ref CapacityBlockId
                    - !Ref 'AWS::NoValue'
              Networking:
                SubnetIds:
                  - !Ref ComputeSubnetId
          SlurmSettings:
            ScaledownIdletime: 10
        SharedStorage:
          - MountDir: /shared
            Name: shared-efs
            StorageType: Efs
            EfsSettings: !If
              - HasExistingEfs
              - FileSystemId: !Ref EfsFileSystemId
                EncryptionInTransit: true
              - ThroughputMode: bursting
                PerformanceMode: generalPurpose
                Encrypted: true
          - !If
            - HasFsxLustre
            - MountDir: /lustre
              Name: lustre-storage
              StorageType: FsxLustre
              FsxLustreSettings:
                FileSystemId: !Ref FsxLustreFileSystemId
            - !Ref 'AWS::NoValue'

  # Associate EIP with head node
  EIPAssociation:
    Type: Custom::EIPAssociation
    Properties:
      ServiceToken: !GetAtt EIPAssociationFunction.Arn
      InstanceId: !GetAtt [PclusterCluster, headNode.instanceId]
      AllocationId: !GetAtt HeadNodeElasticIP.AllocationId

Outputs:
  ClusterName:
    Description: 'Name of the ParallelCluster'
    Value: !Ref ClusterName

  HeadNodeInstanceId:
    Description: 'Head node EC2 instance ID (use to stop/start via console or CLI to save costs)'
    Value: !GetAtt [PclusterCluster, headNode.instanceId]

  HeadNodeIP:
    Description: 'Head node Elastic IP (stable across stop/start cycles)'
    Value: !Ref HeadNodeElasticIP

  SessionManagerCommand:
    Description: 'Connect to head node via Session Manager (no SSH key needed, requires AWS CLI)'
    Value: !Sub
      - 'aws ssm start-session --target ${InstanceId} --region ${AWS::Region}'
      - InstanceId: !GetAtt [PclusterCluster, headNode.instanceId]

  SSHCommand:
    Condition: HasKeyPair
    Description: 'SSH command to connect to head node'
    Value: !If
      - IsUbuntu
      - !Sub
        - 'ssh -i ~/.ssh/${KeyPairName}.pem ubuntu@${IP}'
        - IP: !Ref HeadNodeElasticIP
      - !Sub
        - 'ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${IP}'
        - IP: !Ref HeadNodeElasticIP

  DCVConnectionURL:
    Condition: DCVEnabled
    Description: 'DCV remote desktop URL (login as ec2-user for Amazon Linux, ubuntu for Ubuntu). Bookmark this - the IP never changes.'
    Value: !Sub
      - 'https://${IP}:8443'
      - IP: !Ref HeadNodeElasticIP

  ClusterStatus:
    Description: 'Current cluster status'
    Value: !GetAtt [PclusterCluster, clusterStatus]

  BootstrapLogLocation:
    Description: 'Bootstrap log location on head node'
    Value: 'Connect to head node and run: cat /var/log/bootstrap.log'
