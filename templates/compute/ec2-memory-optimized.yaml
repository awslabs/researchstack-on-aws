AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Memory Optimized Instance (R-series) - Large memory footprint for in-memory databases, caching, and data-intensive research workloads'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Research Project Information'
        Parameters:
          - ProjectName
          - CostCenter
          - Owner
      - Label:
          default: 'Instance Configuration'
        Parameters:
          - InstanceName
          - InstanceType
          - PricingModel
          - OperatingSystem
          - AMI
          - VolumeSize
      - Label:
          default: 'Network Configuration'
        Parameters:
          - VpcId
          - SubnetId
      - Label:
          default: 'Storage'
        Parameters:
          - AutoCreateStorage
          - EfsFileSystemId
          - S3FilesFileSystemId
          - S3BucketName
      - Label:
          default: 'Cost Management'
        Parameters:
          - EnableIdleShutdown
          - IdleMinutesBeforeStop
      - Label:
          default: 'Advanced Configuration (optional)'
        Parameters:
          - CustomAmiId
          - KeyPairName
          - SSHAllowedIps
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      CostCenter:
        default: 'Cost Center'
      Owner:
        default: 'Owner Email (optional)'
      InstanceName:
        default: 'Instance Name'
      InstanceType:
        default: 'Instance Type'
      PricingModel:
        default: 'Pricing Model'
      OperatingSystem:
        default: 'Operating System'
      AMI:
        default: 'AMI'
      VolumeSize:
        default: 'Root Volume Size (GB)'
      VpcId:
        default: 'VPC ID'
      SubnetId:
        default: 'Subnet ID'
      AutoCreateStorage:
        default: 'Shared Storage'
      EnableIdleShutdown:
        default: 'Auto-Stop Idle Instances'
      IdleMinutesBeforeStop:
        default: 'Idle Minutes Before Auto-Stop'
      CustomAmiId:
        default: 'Custom AMI ID (overrides OS/AMI)'
      KeyPairName:
        default: 'SSH Key Pair'
      SSHAllowedIps:
        default: 'SSH Allowed IP Range'
      EfsFileSystemId:
        default: 'Existing EFS Filesystem ID'
      S3FilesFileSystemId:
        default: 'Existing S3 Files Mount Target IP'
      S3BucketName:
        default: 'Existing S3 Bucket Name (CLI access only)'

Parameters:
  ProjectName:
    Type: String
    Description: 'Research project name (used for cost tracking tags and resource naming, e.g., my-project-instance, my-project-sg)'
    AllowedPattern: '^[a-zA-Z0-9-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters and hyphens'
    MinLength: 3
    MaxLength: 40

  CostCenter:
    Type: String
    Description: 'Department or grant number for cost allocation'
    MinLength: 1

  Owner:
    Type: String
    Default: ''
    Description: 'PI or researcher email for cost tracking - helps FinOps trace resources back to a person (optional)'

  InstanceName:
    Type: String
    Default: ''
    Description: 'Display name for this instance in the AWS console (optional - defaults to {ProjectName}-instance). Useful when deploying multiple instances for the same project.'

  InstanceType:
    Type: String
    Default: r8i.xlarge
    Description: 'R-series instance type - high memory-to-CPU ratio for memory-intensive workloads. See the templates README for help choosing a size.'
    AllowedPattern: '^r[0-9]+[a-z]*\.(medium|large|[0-9]*xlarge)$'
    ConstraintDescription: 'Must be an R-series instance type (e.g., r8i.xlarge, r8g.2xlarge, r8a.4xlarge)'

  PricingModel:
    Type: String
    Default: on-demand
    AllowedValues: [on-demand, spot]
    Description: 'On-Demand (default) guarantees availability. Spot saves up to 70% — you pay the current Spot price (capped at On-Demand price, never more). Instance can be interrupted with 2 minutes notice and will stop (not terminate) preserving your data. Use Spot for fault-tolerant batch jobs, not interactive work. Spot capacity varies by instance type and AZ — GPU instances may fail to launch. Retry in a different AZ or switch to On-Demand if needed.'

  OperatingSystem:
    Type: String
    Default: amazon-linux-2023
    AllowedValues:
      - amazon-linux-2023
      - ubuntu-2404
    Description: 'Amazon Linux 2023 recommended (EFS auto-mounts with TLS in seconds). Ubuntu 24.04 also auto-mounts EFS with TLS but takes 3-5 min at boot to build efs-utils from source.'

  AMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
      - /aws/service/canonical/ubuntu/server/noble/stable/current/amd64/hvm/ebs-gp3/ami-id
      - /aws/service/canonical/ubuntu/server/noble/stable/current/arm64/hvm/ebs-gp3/ami-id
    Description: 'Always resolves to the latest AMI. Pick the row matching your OS + architecture (arm64 for Graviton like r8g, x86/amd64 for Intel/AMD like r8i/r8a). See templates README for details.'

  CustomAmiId:
    Type: String
    Default: ''
    Description: 'Custom AMI ID to use instead of the OS/AMI selection above (e.g., ami-0123456789abcdef0). Use this for golden AMIs with pre-installed software. Leave blank to use the standard AMI.'
    AllowedPattern: '^$|^ami-[a-f0-9]+$'
    ConstraintDescription: 'Must be a valid AMI ID (ami-xxxx) or blank'

  VolumeSize:
    Type: Number
    Default: 100
    MinValue: 30
    MaxValue: 16384
    Description: 'Root EBS volume size in GB (gp3, encrypted). Scale this up if you do not plan to use EFS or S3 for data storage.'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC to launch the instance in (deploy the Research VPC template first if you do not have one)'

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet to launch the instance in - must be in the same VPC/subnets as your EFS mount targets if using shared storage. Use a private subnet for production workloads, public for quick experiments.'

  AutoCreateStorage:
    Type: String
    Default: s3-files
    AllowedValues: [s3-files, none]
    Description: 'Automatically create shared storage mounted at /mnt/s3files. s3-files creates an S3 bucket with filesystem access - ~$0.023/GB/month, no cost until you store data. Note: mount takes 5-10 minutes after first boot for DNS propagation. For immediate access, deploy the S3 Files template separately first and provide the filesystem ID below.'

  EfsFileSystemId:
    Type: String
    Default: ''
    Description: 'EFS filesystem ID to mount at /mnt/efs (from the EFS template stack outputs). Auto-mounts with TLS on both AL2023 and Ubuntu - Ubuntu takes 3-5 min longer at boot to build efs-utils. Leave blank if not using shared storage.'
    AllowedPattern: '^$|^fs-[a-f0-9]+$'
    ConstraintDescription: 'Must be a valid EFS filesystem ID (fs-xxxx) or blank'

  S3BucketName:
    Type: String
    Default: ''
    Description: 'S3 bucket name to grant this instance read/write access (from the S3 template stack outputs). Leave blank if not needed.'
    AllowedPattern: '^$|^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name (3-63 chars, lowercase, numbers, hyphens, periods) or blank'

  S3FilesFileSystemId:
    Type: String
    Default: ''
    Description: 'Existing S3 Files filesystem ID to mount at /mnt/s3files (from the S3 Files template stack outputs). Leave blank if using AutoCreateStorage or if not needed.'
    AllowedPattern: '^$|^fs-[a-f0-9]+$'
    ConstraintDescription: 'Must be a valid S3 Files filesystem ID (fs-xxxx) or blank'

  KeyPairName:
    Type: String
    Default: ''
    Description: 'EC2 key pair name for SSH access (optional). If blank, use Session Manager to connect (no SSH keys needed). Requires a public subnet for SSH from outside the VPC. Create a key pair in the EC2 console if you need SSH for file transfers, VS Code Remote, or port forwarding.'

  SSHAllowedIps:
    Type: String
    Default: ''
    Description: 'CIDR block allowed to SSH to this instance (e.g., 203.0.113.0/24 for your office, 0.0.0.0/0 for anywhere). Required when a key pair is provided.'
    AllowedPattern: '^$|^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: 'Must be a valid CIDR block (e.g., 10.0.0.0/8, 0.0.0.0/0) or blank'

  EnableIdleShutdown:
    Type: String
    Default: 'yes'
    AllowedValues: ['yes', 'no']
    Description: 'Automatically stop this instance when idle (low CPU and network) to save costs. The instance and its data are preserved — just start it again when needed.'

  IdleMinutesBeforeStop:
    Type: Number
    Default: 120
    MinValue: 15
    MaxValue: 1440
    Description: 'Minutes of inactivity (CPU < 5%) before the instance is automatically stopped. Default 120 (2 hours). Minimum 15 minutes, maximum 1440 (24 hours).'

Conditions:
  HasOwner: !Not [!Equals [!Ref Owner, '']]
  HasCustomAmi: !Not [!Equals [!Ref CustomAmiId, '']]
  IsSpot: !Equals [!Ref PricingModel, 'spot']
  HasInstanceName: !Not [!Equals [!Ref InstanceName, '']]
  HasEfs: !Not [!Equals [!Ref EfsFileSystemId, '']]
  HasS3: !Not [!Equals [!Ref S3BucketName, '']]
  HasS3Files: !Not [!Equals [!Ref S3FilesFileSystemId, '']]
  AutoCreateS3Files: !Equals [!Ref AutoCreateStorage, 's3-files']
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  IsUbuntu: !Equals [!Ref OperatingSystem, 'ubuntu-2404']
  IsAL2023: !Not [!Condition IsUbuntu]
  NeedsAL2023UserData: !And [!Condition IsAL2023, !Or [!Condition HasEfs, !Condition HasS3Files, !Condition AutoCreateS3Files]]
  IdleShutdownEnabled: !Equals [!Ref EnableIdleShutdown, 'yes']

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Security group for ${ProjectName} EC2 instance'
      GroupName: !Sub '${AWS::StackName}-sg'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound traffic'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-sg'

  SSHIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasKeyPair
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref SSHAllowedIps
      Description: 'SSH access'

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  S3AccessPolicy:
    Type: AWS::IAM::Policy
    Condition: HasS3
    Properties:
      PolicyName: !Sub '${AWS::StackName}-s3-access'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:DeleteObject
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  S3FilesAccessPolicy:
    Type: AWS::IAM::Policy
    Condition: AutoCreateS3Files
    Properties:
      PolicyName: !Sub '${AWS::StackName}-s3files-access'
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3files:ClientMount
              - s3files:ClientWrite
              - s3files:ClientRootAccess
            Resource: '*'
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${AutoS3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${AutoS3Bucket}/*'

  AutoS3Bucket:
    Type: AWS::S3::Bucket
    Condition: AutoCreateS3Files
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub '${ProjectName}-data-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: ResearchStack

  AutoS3FilesRole:
    Type: AWS::IAM::Role
    Condition: AutoCreateS3Files
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticfilesystem.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:GetObject*, s3:PutObject, s3:PutObject*, s3:DeleteObject*, s3:AbortMultipartUpload, s3:List*]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${AutoS3Bucket}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${AutoS3Bucket}/*'
              - Effect: Allow
                Action: [events:DeleteRule, events:DisableRule, events:EnableRule, events:PutRule, events:PutTargets, events:RemoveTargets]
                Resource: 'arn:aws:events:*:*:rule/DO-NOT-DELETE-S3-Files*'
                Condition:
                  StringEquals:
                    events:ManagedBy: elasticfilesystem.amazonaws.com
              - Effect: Allow
                Action: [events:DescribeRule, events:ListRuleNamesByTarget, events:ListRules, events:ListTargetsByRule]
                Resource: 'arn:aws:events:*:*:rule/*'

  AutoS3FilesFileSystem:
    Type: AWS::S3Files::FileSystem
    Condition: AutoCreateS3Files
    Properties:
      Bucket: !Sub 'arn:${AWS::Partition}:s3:::${AutoS3Bucket}'
      RoleArn: !GetAtt AutoS3FilesRole.Arn
      AcceptBucketWarning: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: ResearchStack

  AutoS3FilesSG:
    Type: AWS::EC2::SecurityGroup
    Condition: AutoCreateS3Files
    Properties:
      GroupDescription: !Sub 'NFS for ${ProjectName} S3 Files'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref SecurityGroup
          Description: 'NFS from instance security group'

  AutoS3FilesMountTarget:
    Type: AWS::S3Files::MountTarget
    Condition: AutoCreateS3Files
    Properties:
      FileSystemId: !Ref AutoS3FilesFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref AutoS3FilesSG

  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: IsSpot
    Properties:
      LaunchTemplateData:
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: persistent
            InstanceInterruptionBehavior: stop

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !If [HasCustomAmi, !Ref CustomAmiId, !Ref AMI]
      LaunchTemplate: !If
        - IsSpot
        - LaunchTemplateId: !Ref SpotLaunchTemplate
          Version: !GetAtt SpotLaunchTemplate.LatestVersionNumber
        - !Ref 'AWS::NoValue'
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: !If [IsUbuntu, /dev/sda1, /dev/xvda]
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData: !If
        - IsUbuntu
        - Fn::Base64: !Sub
            - |
              #!/bin/bash -xe
              export DEBIAN_FRONTEND=noninteractive

              for i in $(seq 1 30); do
                apt-get update -y && break
                echo "apt-get update failed (attempt $i/30), retrying in 10s..."
                sleep 10
              done
              APT_OPTS="-o DPkg::Lock::Timeout=300"

              apt-get $APT_OPTS -y install unzip curl
              ARCH=$(uname -m)
              curl "https://awscli.amazonaws.com/awscli-exe-linux-$ARCH.zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp
              /tmp/aws/install
              rm -rf /tmp/aws /tmp/awscliv2.zip

              EFS_ID="${EfsFileSystemId}"
              S3FILES_ID="${ResolvedS3FilesId}"
              if [ -n "$EFS_ID" ] || [ -n "$S3FILES_ID" ]; then
                apt-get $APT_OPTS -y install git binutils rustc cargo pkg-config libssl-dev cmake golang-go
                cd /tmp
                git clone https://github.com/aws/efs-utils.git
                cd efs-utils
                ./build-deb.sh
                apt-get $APT_OPTS -y install ./build/amazon-efs-utils*deb
              fi

              if [ -n "$EFS_ID" ]; then
                mkdir -p /mnt/efs
                mount -t efs -o tls $EFS_ID:/ /mnt/efs
                echo "$EFS_ID:/ /mnt/efs efs _netdev,tls 0 0" >> /etc/fstab
              fi

              if [ -n "$S3FILES_ID" ]; then
                mkdir -p /mnt/s3files
                for i in $(seq 1 20); do mount -t s3files $S3FILES_ID:/ /mnt/s3files && break; echo "S3 Files mount retry $i/20, waiting 15s..."; sleep 15; done
                echo "$S3FILES_ID:/ /mnt/s3files s3files _netdev 0 0" >> /etc/fstab
              fi
            - ResolvedS3FilesId: !If
                - AutoCreateS3Files
                - !Select [1, !Split ['file-system/', !Ref AutoS3FilesFileSystem]]
                - !Ref S3FilesFileSystemId
        - !If
          - NeedsAL2023UserData
          - Fn::Base64: !Sub
              - |
                #!/bin/bash -xe
                yum install -y amazon-efs-utils

                EFS_ID="${EfsFileSystemId}"
                if [ -n "$EFS_ID" ]; then
                  mkdir -p /mnt/efs
                  mount -t efs -o tls $EFS_ID:/ /mnt/efs
                  echo "$EFS_ID:/ /mnt/efs efs _netdev,tls 0 0" >> /etc/fstab
                fi

                S3FILES_ID="${ResolvedS3FilesId}"
                if [ -n "$S3FILES_ID" ]; then
                  mkdir -p /mnt/s3files
                  for i in $(seq 1 20); do mount -t s3files $S3FILES_ID:/ /mnt/s3files && break; echo "S3 Files mount retry $i/20, waiting 15s..."; sleep 15; done
                  echo "$S3FILES_ID:/ /mnt/s3files s3files _netdev 0 0" >> /etc/fstab
                fi
              - ResolvedS3FilesId: !If
                - AutoCreateS3Files
                - !Select [1, !Split ['file-system/', !Ref AutoS3FilesFileSystem]]
                - !Ref S3FilesFileSystemId
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Name
          Value: !If [HasInstanceName, !Ref InstanceName, !Sub '${ProjectName}-instance']
        - Key: Project
          Value: !Ref ProjectName
        - Key: CostCenter
          Value: !Ref CostCenter
        - !If
          - HasOwner
          - Key: Owner
            Value: !Ref Owner
          - !Ref 'AWS::NoValue'
        - Key: ManagedBy
          Value: ResearchStack
        - Key: Environment
          Value: Research

  IdleShutdownAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IdleShutdownEnabled
    Properties:
      AlarmName: !Sub '${AWS::StackName}-idle-shutdown'
      AlarmDescription: !Sub 'Stops instance after ${IdleMinutesBeforeStop} minutes of idle CPU (< 5%)'
      ActionsEnabled: true
      AlarmActions:
        - !Sub 'arn:${AWS::Partition}:automate:${AWS::Region}:ec2:stop'
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref IdleMinutesBeforeStop
      DatapointsToAlarm: !Ref IdleMinutesBeforeStop
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching

Outputs:
  InstanceId:
    Description: 'EC2 instance ID (use this with SSM Session Manager to connect)'
    Value: !Ref Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  PrivateIp:
    Description: 'Private IP address (for connecting to this instance from within the VPC)'
    Value: !GetAtt Instance.PrivateIp
    Export:
      Name: !Sub '${AWS::StackName}-PrivateIp'

  SecurityGroupId:
    Description: 'Security group ID (add inbound rules as needed, or attach to EFS for shared storage)'
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'

  SSMConnectCommand:
    Description: 'Connect to the instance via SSM Session Manager (no SSH key needed)'
    Value: !Sub 'aws ssm start-session --target ${Instance} [--profile your-profile-name]'

  StartInstanceCommand:
    Description: 'Start the instance after it has been stopped (by idle shutdown or manually)'
    Value: !Sub 'aws ec2 start-instances --instance-ids ${Instance} [--profile your-profile-name]'

  StopInstanceCommand:
    Description: 'Stop the instance to save costs (EBS data is preserved, RAM is lost)'
    Value: !Sub 'aws ec2 stop-instances --instance-ids ${Instance} [--profile your-profile-name]'

  SSHConnectCommand:
    Condition: HasKeyPair
    Description: 'Connect via SSH (requires key pair and instance in a public subnet with a public IP or Elastic IP)'
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@INSTANCE_PUBLIC_IP'

  IdleShutdownInfo:
    Condition: IdleShutdownEnabled
    Description: 'This instance will auto-stop after the configured idle period. Use the StartInstanceCommand to restart it.'
    Value: !Sub 'Auto-stop enabled: instance stops after ${IdleMinutesBeforeStop} minutes of idle CPU (< 5%)'
